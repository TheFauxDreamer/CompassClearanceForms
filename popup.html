<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 240px;
            padding: 16px;
            background: #fff;
        }

        h3 {
            font-size: 14px;
            color: #1976d2;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .setting {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .setting label {
            font-size: 13px;
            color: #333;
            cursor: pointer;
        }

        /* Toggle switch */
        .toggle {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 22px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle .slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle input:checked + .slider {
            background: #1976d2;
        }

        .toggle input:checked + .slider::before {
            transform: translateX(18px);
        }

        .description {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <h3>Clearance Form Settings</h3>
    <div class="setting">
        <label for="quickPrint">Quick Print</label>
        <label class="toggle">
            <input type="checkbox" id="quickPrint">
            <span class="slider"></span>
        </label>
    </div>
    <p class="description">Skip the preview and open the print dialogue immediately.</p>

    <div class="setting" style="margin-top: 14px;">
        <label for="year12Only">Year 12 Only</label>
        <label class="toggle">
            <input type="checkbox" id="year12Only">
            <span class="slider"></span>
        </label>
    </div>
    <p class="description">Only show the clearance button for Year 12 students.</p>

    <script src="popup.js"></script>
</body>
</html>
